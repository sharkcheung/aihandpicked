baseURL = "https://aihandpicked.xyz"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "AI Handpicked — Best AI Tools Reviewed & Compared (2026)"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true
paginate = 20

# Languages configuration for bilingual support
[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    languageCode = "en-US"
    weight = 1
    title = "AI Handpicked"
    params.description = "Your curated guide to the best AI tools in 2026. Honest reviews, comparisons, and pricing for ChatGPT, Midjourney, Cursor, and 20+ top AI tools."

  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    weight = 2
    title = "AI Handpicked — 精选AI工具导航"
    contentDir = "content/zh"
    params.description = "2026年最优秀的AI工具精选导航。ChatGPT、Midjourney、Claude、Cursor等热门AI工具的真实评测、定价对比。"
    params.keywords = ["AI工具", "人工智能", "ChatGPT", "AI写作", "AI图像生成", "AI编程", "AI视频", "AI评测"]

[params]
  env = "production"
  description = "AI Handpicked — Your curated guide to the best AI tools in 2026. Honest reviews, comparisons, and pricing for ChatGPT, Midjourney, Cursor, and 20+ top AI tools."
  author = "AI Handpicked"
  keywords = ["best AI tools", "AI tools review", "ChatGPT alternative", "Midjourney review", "AI writing tools", "AI image generator", "AI coding assistant", "AI video generator", "AI voice generator"]
  label = { text = "🤖 AI Handpicked" }
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  mainSections = ["tools", "categories"]
  copyright = "© 2026 AI Handpicked. All rights reserved."

  # SEO
  defaultTheme = "auto"
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false

  # Open Graph / Social
  images = ["og-image.png"]

  # Home Info mode
  homeInfoParams = { Title = "🤖 AI Handpicked", Content = "Your curated guide to the **best AI tools** — honestly reviewed, clearly compared, always up to date." }

  # Language Switcher
  ShowLangMenu = true
  langMenuLabel = "🌐 语言 / Language"

# For SEO - ensure proper URLs
[permalinks]
  tools = "/tools/:slug/"
  categories = "/categories/:slug/"

[services]
  [services.googleAnalytics]
    ID = ""

[markup.highlight]
  noClasses = false
  lineNos = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 6

[taxonomies]
  category = "categories"
  tag = "tags"

# RSS feed config
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[outputFormats.RSS]
  mediatype = "application/rss+xml"
  baseName = "index"

[security]
  [security.funcs]
    getenv = ["^HUGO_", "^GIT_"]
