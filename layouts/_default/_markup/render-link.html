{{- /* Render link hook: prepend language subdirectory for internal links */ -}}
{{- $dest := .Destination -}}
{{- $lang := .Page.Language.Lang -}}
{{- if hasPrefix $dest "/" -}}
  {{- $dest = printf "/%s%s" $lang $dest -}}
{{- end -}}
<a href="{{ $dest | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}>{{ .Text }}</a>
